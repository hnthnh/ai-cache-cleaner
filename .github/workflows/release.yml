name: Release

on:
  push:
    tags:
      - 'v*' # Trigger build when a version tag like v1.0.0 is pushed

jobs:
  publish:
    name: Build and Release for ${{ matrix.os }} - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ai-cache-cleaner-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ai-cache-cleaner-macos-intel
          - os: macos-14 # macOS Apple Silicon M1/M2/M3
            target: aarch64-apple-darwin
            artifact_name: ai-cache-cleaner-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary for target in release mode
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package compiled binary into a tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.artifact_name }}.tar.gz ai-cache-cleaner
          cd -

      - name: Upload and publish release assets to GitHub Release page
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
